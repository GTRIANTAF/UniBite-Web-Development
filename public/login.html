<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBite - Είσοδος / Εγγραφή</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #FFF3E0 0%, #E8F5E9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .auth-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 25px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 85%;
            max-width: 360px;
            text-align: center;
            box-sizing: border-box;
        }
        .title-font { font-family: 'Plus Jakarta Sans', sans-serif; color: #FF5722; font-size: 28px; margin-bottom: 20px; }
        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn-auth {
            width: 100%;
            padding: 12px;
            background: #FF5722;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-auth:hover { background: #e64a19; }
        .switch-text { margin-top: 20px; font-size: 14px; color: #666; }
        .switch-text a { color: #4CAF50; font-weight: bold; text-decoration: none; cursor: pointer; }
        .hidden-view { display: none !important; }

        @media (min-width: 480px) {
            .auth-container {
                padding: 50px 60px;
                max-width: 480px;
            }

            .title-font {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <h2 id="auth-title" class="title-font">UniBite Login</h2>

    <input type="text" id="reg-username" class="auth-input hidden-view" placeholder="Όνομα Χρήστη">

    <input type="email" id="auth-email" class="auth-input" placeholder="Email">
    <input type="password" id="auth-pass" class="auth-input" placeholder="Κωδικός Πρόσβασης">

    <button id="auth-btn" onclick="handleAuth()" class="btn-auth">Είσοδος</button>

    <p class="switch-text">
        <span id="auth-switch-text">Δεν έχεις λογαριασμό;</span>
        <a id="auth-switch-link" onclick="toggleAuthMode()">Εγγραφή</a>
    </p>
</div>

<script>
    let isLoginMode = true;

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;

        const title = document.getElementById('auth-title');
        const btn = document.getElementById('auth-btn');
        const switchText = document.getElementById('auth-switch-text');
        const switchLink = document.getElementById('auth-switch-link');
        const usernameInput = document.getElementById('reg-username');

        if (isLoginMode) {
            title.innerText = 'UniBite Login';
            btn.innerText = 'Είσοδος';
            switchText.innerText = 'Δεν έχεις λογαριασμό;';
            switchLink.innerText = 'Εγγραφή';
            usernameInput.classList.add('hidden-view');
        } else {
            title.innerText = 'Register';
            btn.innerText = 'Εγγραφή';
            switchText.innerText = 'Έχεις ήδη λογαριασμό;';
            switchLink.innerText = 'Είσοδος';
            usernameInput.classList.remove('hidden-view');
        }
    }

    async function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-pass').value;

        if (isLoginMode) {
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('unibite_token', data.token);
                    localStorage.setItem('unibite_user_id', data.user.id);
                    localStorage.setItem('unibite_is_admin', data.user.is_admin ? '1' : '0');

                    window.location.href = 'start.html';
                } else {
                    alert('Σφάλμα: ' + data.error);
                }
            } catch (err) {
                alert('Πρόβλημα σύνδεσης με τον Server.');
            }
        } else {
            const username = document.getElementById('reg-username').value;

            if (!username || !email || !password) {
                alert('Συμπλήρωσε όλα τα πεδία!');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Επιτυχία! Τώρα μπορείς να κάνεις είσοδο.');
                    toggleAuthMode();
                } else {
                    alert('Σφάλμα: ' + data.error);
                }
            } catch (err) {
                alert('Πρόβλημα σύνδεσης με τον Server.');
            }
        }
    }
</script>
</body>
</html>
