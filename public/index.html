<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBite - Explore</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<nav class="navigation">
    <div class="logo">UniBite</div>

    <ul class="nav-links">
        <li><a href="#" class="active"><span class="material-icons">home</span> <span class="nav-text">Home</span></a></li>
        <li><a href="#"><span class="material-icons">receipt_long</span> <span class="nav-text">Orders</span></a></li>
        <li><a href="#"><span class="material-icons">person</span> <span class="nav-text">Profile</span></a></li>
    </ul>

</nav>

<main class="main-content">

    <header class="top-header">
        <h2>UniBite</h2>
    </header>

    <div class="view-toggle">
        <button id="list-view-btn" class="toggle-btn active"><span class="material-icons">view_list</span> List</button>
        <button id="map-view-btn" class="toggle-btn"><span class="material-icons">map</span> Map</button>
    </div>

    <div class="range-container">
        <div class="range-header">
            <span>Ακτίνα Αναζήτησης</span>
            <span id="range-value" class="range-badge">5 km</span>
        </div>
        <input type="range" id="distance-range" min="1" max="20" value="5" class="modern-slider">
    </div>

    <div id="map" class="hidden-view"></div>

    <div class="feed-container" id="dynamic-feed">

    </div>
</main>
    <script src="app.js"></script>
</body>
</html>
