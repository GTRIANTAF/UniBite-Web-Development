<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBite - Explore</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<nav class="navigation">
    <div class="logo">UniBite</div>

    <ul class="nav-links">
        <li><a href="#" class="active"><span class="material-icons">home</span> <span class="nav-text">Home</span></a></li>
        <li><a href="#"><span class="material-icons">receipt_long</span> <span class="nav-text">Orders</span></a></li>

        <li class="nav-spacer"></li>

        <li><a href="#"><span class="material-icons">restaurant</span> <span class="nav-text">Kitchen</span></a></li>
        <li><a href="#"><span class="material-icons">person</span> <span class="nav-text">Profile</span></a></li>
    </ul>

    <button class="fab-post">
        <span class="material-icons">add</span>
        <span class="fab-text">Post Food</span>
    </button>
</nav>

<main class="main-content">

    <header class="top-header">
        <h2>UniBite</h2>
    </header>

    <div class="view-toggle">
        <button class="toggle-btn active"><span class="material-icons">view_list</span> List</button>
        <button class="toggle-btn"><span class="material-icons">map</span> Map</button>
    </div>

    <div class="feed-container" id="dynamic-feed">

        </div>


    <div class="post-form hidden" id="post-form">

    <h2>Νέα Αγγελία</h2>

    <input type="text" id="title" placeholder="Τίτλος">

    <textarea id="description" placeholder="Περιγραφή"></textarea>

    <input type="text" id="pickup_location" placeholder="Τοποθεσία">

    <input type="number" id="portions" placeholder="Μερίδες">

    <input type="datetime-local" id="pickup_time">

    <button id="submit-post">Δημιουργία Αγγελίας</button>

      </div>
</main>
    <script src="app.js"></script>
</body>
</html>
